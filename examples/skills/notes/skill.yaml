name: note-taking
version: "1.0"
description: Create, search, tag, and organize personal notes
tools:
  - create_note
  - search_notes
  - list_notes
  - delete_note
triggers:
  - "remember this"
  - "make a note"
  - "save that"
  - "note that"
  - "write down"
  - "jot down"
examples:
  - "Note that my dentist appointment is next Tuesday"
  - "Make a note: finish the React project by Friday"
  - "What notes do I have about the gym?"
  - "Delete note note_abc123"
