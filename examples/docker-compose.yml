services:
  neo4j:
    image: neo4j:5.18-community
    container_name: memoryos-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-memoryos}
    ports:
      - "7687:7687"
      - "7474:7474"
    volumes:
      - neo4j-data:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p ${NEO4J_PASSWORD:-memoryos} 'RETURN 1' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  memgraph:
    image: memgraph/memgraph-platform:latest
    container_name: memoryos-memgraph
    restart: unless-stopped
    ports:
      - "7688:7687"
      - "3000:3000"
    volumes:
      - memgraph-data:/var/lib/memgraph
    healthcheck:
      test: ["CMD", "mg_client", "--host", "localhost", "--port", "7687", "-e", "RETURN 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  redis:
    image: redis/redis-stack-server:latest
    container_name: memoryos-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  neo4j-data:
  memgraph-data:
  redis-data:

networks:
  default:
    name: memoryos-net
